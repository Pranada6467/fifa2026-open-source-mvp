# E1 — the automated nightly loop.
#
# Runs `python -m fifapreds.orchestrate` (fetch → score → fit → predict →
# simulate → publish) and commits the updated predictions DB + artifacts back
# to the repo. CI is the SOLE writer of data/fifa2026.db — never run
# orchestrate locally against a checkout that also receives these commits
# (see README "Automated nightly loop").
#
# The integrity gate: orchestrate exits 2 when the scorer reports violations
# (training data leaked past kickoff, or a live claim logged after kickoff).
# That fails this job BEFORE the commit step — a violation must produce a red
# build and an uncommitted run, never a silently published breach.

name: nightly

on:
  schedule:
    # 06:30 UTC = late evening in North America: the day's matches are final
    # and martj42 has usually ingested them. Claims start at TOMORROW's
    # fixtures by design (date-only kickoffs), so today's matches were already
    # claimed by previous runs — this run grades them and claims onward.
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        # [bayesian] pulls in pymc + nutpie so HierarchicalPoisson (E3) joins
        # the roster on CI. Per-model 5-min timeout in _fit_roster guards the
        # nightly budget against a slow sampler.
        run: python -m pip install -e ".[bayesian]"

      - name: Run the live loop (violations gate — exit 2 turns this red)
        run: python -m fifapreds.orchestrate

      - name: Commit DB + artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fifa2026.db artifacts/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "nightly: orchestrate $(date -u +%F)"
            git pull --rebase origin main
            git push origin main
          fi
